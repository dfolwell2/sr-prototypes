<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staffing Referrals. Candidate Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  /* Candidate-record overview card. Momentum & Clarity tokens:
     2px radius, hairline #e8e3e3 borders, flat, no shadows. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Inter", sans-serif; color: #0d0d0d; background: #fff; padding: 12px 14px; }
  .brand { display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px; }
  .brand-name { font-family: "Outfit", sans-serif; font-weight: 700; font-size: 11px; letter-spacing: -0.01em; }
  .brand-sub { font-size: 10px; color: #6f6868; }

  /* Bonus progress: the retention talk-track */
  .bonus { border: 1px solid #e8e3e3; background: linear-gradient(135deg, rgba(79,70,229,0.03), rgba(5,150,105,0.02)); padding: 10px 12px; margin-bottom: 10px; }
  .bonus-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .bonus-label { font-size: 10px; color: #6f6868; }
  .bonus-val { font-family: "JetBrains Mono", monospace; font-weight: 600; font-size: 12px; color: #059669; }
  .bar { height: 6px; background: #e8e3e3; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; width: 69%; background: #059669; border-radius: 2px; }
  .bonus-foot { font-size: 9.5px; color: #6f6868; margin-top: 5px; }

  /* Activity: proof this person is an active ambassador */
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid #e8e3e3; margin-bottom: 10px; }
  .stat { padding: 8px 10px; border-right: 1px solid #e8e3e3; }
  .stat:last-child { border-right: none; }
  .num { font-family: "JetBrains Mono", monospace; font-weight: 600; font-size: 18px; line-height: 1.1; }
  .num.green { color: #059669; }
  .lbl { font-size: 9.5px; color: #6f6868; margin-top: 2px; line-height: 1.3; }

  /* Actions: existing Reach Out verbs only */
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .cta { height: 34px; border-radius: 2px; font-family: "Inter", sans-serif; font-size: 12.5px; font-weight: 500; cursor: pointer; transition: background 100ms ease, color 100ms ease; }
  .cta.primary { background: #4f46e5; color: #fff; border: none; }
  .cta.primary:hover { background: #4338ca; }
  .cta.secondary { background: #fff; color: #0d0d0d; border: 1px solid #e8e3e3; }
  .cta.secondary:hover { border-color: #4f46e5; color: #4f46e5; }

  .hs { font-family: "JetBrains Mono", monospace; font-size: 8.5px; color: #b3aaaa; margin-top: 10px; word-break: break-all; }
</style>
</head>
<body>
  <div class="brand">
    <span class="brand-name">Staffing Referrals</span>
    <span class="brand-sub">Ambassador activity for this candidate</span>
  </div>

  <div class="bonus">
    <div class="bonus-row">
      <span class="bonus-label">Assignment completion bonus</span>
      <span class="bonus-val">Week 9 of 13 &middot; $500</span>
    </div>
    <div class="bar"><div class="bar-fill"></div></div>
    <p class="bonus-foot">4 weeks to go. A good moment to check in.</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="num">312</div><div class="lbl">pageviews on shares</div></div>
    <div class="stat"><div class="num">4</div><div class="lbl">referrals sent</div></div>
    <div class="stat"><div class="num green">$750</div><div class="lbl">earned so far</div></div>
  </div>

  <div class="actions">
    <button class="cta primary" id="shareJob">Share a Job</button>
    <button class="cta secondary" id="invite">Invite to Program</button>
  </div>

  <p class="hs" id="bh-params"></p>

<script>
  /* Demo behavior: each action opens the panel prototype pre-filled for
     that flow, passing Bullhorn's handshake params through. */
  var qs = location.search || "";
  var sep = qs ? "&" : "?";
  function openPanel(action) {
    window.open("https://dfolwell2.github.io/sr-prototypes/candidate-card/panel.html" + qs + sep + "action=" + action, "_blank", "width=840,height=720");
  }
  document.getElementById("shareJob").addEventListener("click", function () { openPanel("share"); });
  document.getElementById("invite").addEventListener("click", function () { openPanel("invite"); });

  var q = new URLSearchParams(qs);
  var out = document.getElementById("bh-params");
  if (q.get("EntityID") || q.get("UserID")) {
    out.textContent = "handshake: EntityID=" + (q.get("EntityID") || "?") + " UserID=" + (q.get("UserID") || "?");
  } else {
    out.textContent = "opened outside Bullhorn: no params received";
  }
</script>
</body>
</html>
