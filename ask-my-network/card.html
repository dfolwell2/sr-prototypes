<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask My Network. Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  /* Compact overview-card variant. Momentum & Clarity tokens:
     2px radius, hairline #e8e3e3 borders, flat, no shadows. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Inter", sans-serif; color: #0d0d0d; background: #fff; padding: 12px 14px; }
  .brand { display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px; }
  .brand-name { font-family: "Outfit", sans-serif; font-weight: 700; font-size: 11px; letter-spacing: -0.01em; }
  .brand-sub { font-size: 10px; color: #6f6868; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid #e8e3e3; background: linear-gradient(135deg, rgba(79,70,229,0.03), rgba(5,150,105,0.02)); }
  .stat { padding: 8px 10px; border-right: 1px solid #e8e3e3; }
  .stat:last-child { border-right: none; }
  .num { font-family: "JetBrains Mono", monospace; font-weight: 600; font-size: 20px; line-height: 1.1; }
  .num.green { color: #059669; }
  .lbl { font-size: 9.5px; color: #6f6868; margin-top: 2px; line-height: 1.3; }
  .resting { font-size: 10px; color: #6f6868; margin: 8px 0 10px; }
  .cta { display: block; width: 100%; height: 34px; background: #4f46e5; color: #fff; border: none; border-radius: 2px; font-family: "Inter", sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 100ms ease; }
  .cta:hover { background: #4338ca; }
  .hs { font-family: "JetBrains Mono", monospace; font-size: 8.5px; color: #b3aaaa; margin-top: 8px; word-break: break-all; }
</style>
</head>
<body>
  <div class="brand">
    <span class="brand-name">Staffing Referrals</span>
    <span class="brand-sub">Network reach for this job</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="matched">23</div><div class="lbl">matched ambassadors</div></div>
    <div class="stat"><div class="num green">14</div><div class="lbl">active last 90 days</div></div>
    <div class="stat"><div class="num">8</div><div class="lbl">candidates in reach</div></div>
  </div>

  <p class="resting">4 ambassadors resting this week to keep response rates high.</p>

  <button class="cta" id="openPanel">Ask My Network &middot; 2 of 3 asks left today</button>

  <p class="hs" id="bh-params"></p>

<script>
  /* Demo behavior: the card is the ambient signal; the click opens the
     full panel (prototype) in a new window, passing Bullhorn's params through. */
  var qs = location.search || "";
  document.getElementById("openPanel").addEventListener("click", function () {
    window.open("https://dfolwell2.github.io/sr-prototypes/ask-my-network/" + qs, "_blank", "width=840,height=720");
  });
  var q = new URLSearchParams(qs);
  var out = document.getElementById("bh-params");
  if (q.get("EntityID") || q.get("UserID")) {
    out.textContent = "handshake: EntityID=" + (q.get("EntityID") || "?") + " UserID=" + (q.get("UserID") || "?");
  } else {
    out.textContent = "opened outside Bullhorn: no params received";
  }
</script>
</body>
</html>
